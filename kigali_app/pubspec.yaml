name: kigali_services
description: Kigali City Services & Places Directory
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0

  # OpenStreetMap - FREE, no API key needed (replaces google_maps_flutter)
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # State Management
  provider: ^6.1.1

  # URL Launcher (navigation button still opens Google Maps app)
  url_launcher: ^6.2.4

  # UI & Icons
  cupertino_icons: ^1.0.6

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  geolocator: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true